<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
:root{
  --paper:#131C36; --card:#1B2748; --ink:#EFE7D2; --sub:#8E96B8;
  --line:rgba(198,164,94,.28); --shu:#C6A45E; --shud:#A8863F; --gold:#E2C78A;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:#131C36;
  background-image:linear-gradient(180deg,#24345C 0%,#182342 55%,#101830 100%);
  background-attachment:fixed;
  color:var(--ink);
  font-family:'Zen Kaku Gothic New',sans-serif;
  min-height:100vh;
}
.mincho{font-family:'Shippori Mincho',serif}
button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit}
textarea{font-family:inherit}
textarea:focus,button:focus-visible{outline:2px solid var(--shu);outline-offset:2px}

header{
  padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
  border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:flex-end;
}
header .l1{font-size:11px;letter-spacing:.2em;color:var(--sub)}
header .l2{font-size:18px;font-weight:600;letter-spacing:.08em}
header .r{font-size:11px;color:var(--sub);text-align:right;line-height:1.5}

main{max-width:440px;margin:0 auto;padding:16px 16px calc(96px + env(safe-area-inset-bottom))}

.band{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:6px;padding:12px 16px;margin-bottom:14px}
.band.accent{border-left-color:var(--shu)}
.band .lbl{font-size:11px;letter-spacing:.2em;font-weight:700;color:var(--sub);margin-bottom:6px}
.band.accent .lbl{color:var(--shu)}

.titlecard{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:14px;display:flex;gap:14px;margin-bottom:14px}
.hanko{position:relative;flex-shrink:0;width:56px;height:56px}
.hanko .sq{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--gold),var(--shu));color:#131C36;transform:rotate(-2deg);border-radius:6px;
  box-shadow:inset 0 0 0 2px rgba(19,28,54,.35),0 2px 6px rgba(0,0,0,.4);
  font-family:'Shippori Mincho',serif;font-weight:700;line-height:1;
}
.hanko .zumi{
  position:absolute;right:-8px;bottom:-8px;width:30px;height:30px;border-radius:50%;
  border:2px solid var(--gold);color:var(--gold);background:rgba(19,28,54,.85);
  font-family:'Shippori Mincho',serif;font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;transform:rotate(8deg);
}
.stampIn{animation:stamp .35s cubic-bezier(.2,1.6,.4,1) both}
@keyframes stamp{from{transform:scale(2) rotate(8deg);opacity:0}to{transform:scale(1) rotate(8deg);opacity:1}}
@media (prefers-reduced-motion:reduce){.stampIn{animation:none}}

.tt{flex:1;min-width:0}
.tt .yj{font-size:11px;letter-spacing:.2em;color:var(--sub)}
.tt .ti{font-size:18px;font-weight:600;line-height:1.4;margin-top:4px}
.vgap{flex-shrink:0;writing-mode:vertical-rl;font-size:13px;font-weight:600;
  color:var(--shu);border-left:1px solid var(--line);padding-left:12px;letter-spacing:.35em}

.teach{font-size:13px;line-height:1.8}
.actTxt{font-size:16px;font-weight:600;line-height:1.7}

.btnMain{width:100%;margin-top:12px;padding:13px;border-radius:6px;font-size:13px;font-weight:700;letter-spacing:.2em;
  background:linear-gradient(180deg,var(--gold),var(--shu));color:#131C36;border:1.5px solid var(--shud)}
.btnMain.done{background:transparent;color:var(--gold);border-color:var(--gold)}
.btnAlt{width:100%;margin-top:8px;font-size:11px;color:var(--sub);padding:4px}
.altList{margin-top:6px;list-style:none}
.altList li{margin-bottom:5px}
.altList button{width:100%;text-align:left;font-size:11px;padding:8px 10px;border-radius:5px;border:1px solid var(--line);line-height:1.6}
.altList button.now{background:rgba(198,164,94,.12);border-color:var(--shu)}
.altList b{color:var(--shu)}

textarea.memo,textarea.io{width:100%;font-size:13px;padding:8px;border-radius:5px;resize:none;
  background:#101830;border:1px solid var(--line);color:var(--ink)}
textarea.io{font-size:11px}

<script>

/* ============ データ：十七ヶ条 ============ */
var KAN=["一","二","三","四","五","六","七","八","九","十","十一","十二","十三","十四","十五","十六","十七"];
var ART=[
{y:"日々好日",t:"今日は最良の一日、今は無二の好機",e:"今日は最良の一日、今は無二の好機。気づいた時が最好のチャンス。延ばすほど条件は悪くなる。思い立つ日が最上吉日。",a:[
"アラームが鳴ったら5秒以内に布団を出る",

"2分で終わる用事（返信・片づけ）はその場で処理する",

{y:"苦難福門",t:"苦難は幸福の門",e:"苦難は幸福に入る狭い門。生活のゆがみを知らせる危険信号である。にっこり笑って、エイと一声——正面から押し開けば、奥に光明と歓喜の世界が待っている。",a:[
"いま一番の困り事を1つ書き「何のサイン？」と原因を1つメモ",
"イヤな事が起きたら口角を上げ、心で「よし来た、エイ！」と言って対処",

"トラブルの時、ため息の代わりに「面白くなってきた」とつぶやく",

{y:"運命自招",t:"運命は自らまねき、境遇は自ら造る",e:"運命は自らまねき、境遇は自ら造る。チャンスの前髪は出会った瞬間につかめ。己が一切、努力がすべて。やれば出来る。",a:[
"「運が悪い」「どうせ」「〜のせい」を今日一日禁句にする",

"誘い・依頼・ひらめきに10分以内に返事か着手する",
"今日の目標を1つ書き、最初の一歩を10分以内に実行する",
"沈んだ場に、自分から明るい第一声を入れる",
"人任せにしていた事を1つ、自分で決めて動く",

{y:"万象我師",t:"人は鏡、万象はわが師",e:"人は鏡、万象はわが師。相手はわが心を映す影像。ガラスを拭くな、自分の顔をぬぐえ。まず自ら改め、自分が変わればよい。",a:[
"あいさつを自分から先に、明るい声でする（山彦の実験）",
"イラッとしたら、相手でなく自分の声と表情を一段明るく切り替える",
"店員さんに自分から、目を見て「ありがとう」と言う",
"相手の欠点に気づいたら、自分の同じ癖を1つ探す",
"寝る前、「今日の師（人・物・自然・失敗）」を1つ一行メモ",
"通勤路の空や木を1つ、初めて見るつもりで30秒観察する",
"苦手な人の良いところを、1つ見つけてメモする",
"注意したくなったら、まず自分が手本を見せる",
"周りの機嫌は自分の鏡と考え、まず自分の態度を整える",
"今日出会う人すべてを「先生」と思い、一言ずつ学ぶ"]},
{y:"夫婦対鏡",t:"夫婦は一対の反射鏡",e:"夫婦（最も身近な人）は向き合う一対の反射鏡。相手を直そうとするのは逆。ただ自分をみがけば、相手は必ず自然に改まる。",a:[
"朝と帰宅時のあいさつを、自分から先に目を見てする",
"「〇〇してくれてありがとう」と具体的に1回伝える",
"小言を言いたくなったら、心で「逆である」と3秒唱えてから話す",
"相手への不満に気づいたら、自分の同じ癖を1つ改める",
"相手の好きな飲み物やおやつを1つ用意する",
"相手の話を、スマホを置いて最後まで聞く",
"「ごめん」を自分から先に言う（勝ち負けを手放す）",
"相手がしてくれている家事や仕事を、1つ代わりにやる",
"楽しかった思い出を1つ、話題にする",
"夜、「今日、相手に映っていた自分」を一行記録"]},
{y:"子女名優",t:"子は親の心を実演する名優である",e:"子（部下・後輩）は自分の心を実演する名優。家や職場はその舞台。竹林は風が止めば静まる——騒ぐ竹でなく、風（自分の心）を先に静めよ。",a:[
"相手の気になる行動に、叱る前3秒「私のどの心の実演？」と自問",
"注意の前に深呼吸1回。声を一段落ち着けてから話す",
"直してほしい事を、まず自分が黙ってやって見せる",
"家族やチームの前で、明るい会話の時間を5分つくる",

"命令形を1回、お願い形か質問形に言い換える",
"自分の口癖そっくりな相手の言葉に気づいたら、笑って自分を直す",
"夜、「今日、周りに映っていた私」を一行記録"]},
{y:"疾病信号",t:"肉体は精神の象徴、病気は生活の赤信号",e:"肉体は心の象徴。不調は生活の無理を知らせる天の赤信号。恐れず、喜んで受けて間違いを直せば、体は自然に整う。（必要な受診は続けたうえで）",a:[
"朝30秒、頭→肩→胃→腰の順に体調スキャンし、サインを1つメモ",

"不調が出たら舌打ちでなく「教えてくれてありがとう」と言う",
"今夜はいつもより30分早く布団に入る",
"昼食を腹八分にして、ゆっくり噛んで食べる",
"1時間に1回、立ち上がって伸びをする",
"カフェイン・酒・甘い物のどれか1つを今日は控えめにする",
"10分だけ散歩か軽いストレッチをする",
"夜、「体のサイン→打った一手→体の反応」を一行記録"]},
{y:"明朗愛和",t:"明朗は健康の父、愛和は幸福の母",e:"明朗は健康の父、愛和は幸福の母。愛は出すほど湧く母乳、汲まねば腐る井戸水。一分も心を曇らせず、親切を先に出せ。",a:[
"起きたらカーテンを開け「今日も明るく」と一声",
"鏡の前で口角を上げて10秒キープ",
"挨拶は名前つきで半トーン明るく、自分から先に",
"ため息・眉間のしわに気づいたら、水を一杯＋口角上げ（1分リセット）",
"見返りなしの親切を1つ先に出す（ドア押さえ・席ゆずり等）",
"沈んでいる人・輪の外の人に「最近どう？」と一声かける",

{y:"破約失福",t:"約束を違えれば、己の幸を捨て他人の福を奪う",e:"約束を破れば、己の幸を捨て他人の福を奪う。自然の約束を守るように、人との約束・自分との約束を守る。まず時間を守ることから。",a:[

"「今度〜ね」の放置中の約束を1つ回収（実行か日程提案）",
"頼まれごとに即答せず、3秒「本当に守れるか」考えて返事",
"遅れそうと分かった瞬間に連絡＋謝罪＋代案",
"提出物・返信を、期限より前に1つ出す",

{y:"勤労歓喜",t:"働きは最上の喜び",e:"働きは最上の喜び。ま心で働けば喜びがわき、給与は天の割増金。職業に上下貴賤なし。只今の仕事の尊さを悟って命がけで働く時、最高至上の歓喜がある。",a:[

"仕事前にPCの画面と机をひと拭きしてから始める",

/* ============ ユーティリティ・保存 ============ */
var KEY="shiori-v2";
var ANCHOR=Math.floor(Date.UTC(2026,6,14)/86400000); /* 2026-07-14 = 第一条 */
function dayNum(d){d=d||new Date();return Math.floor((d.getTime()-d.getTimezoneOffset()*60000)/86400000);}
function dateKey(d){var y=d.getFullYear(),m=("0"+(d.getMonth()+1)).slice(-2),dd=("0"+d.getDate()).slice(-2);return y+"-"+m+"-"+dd;}
function keyFromDayNum(n){var ms=n*86400000;var dd=new Date(ms+new Date(ms).getTimezoneOffset()*60000);return dateKey(dd);}
var WD=["日","月","火","水","木","金","土"];
function fmtDate(d){d=d||new Date();return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日（"+WD[d.getDay()]+"）";}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

var canStore=false;
try{localStorage.setItem("shiori-probe","1");localStorage.removeItem("shiori-probe");canStore=true;}catch(e){}
function loadData(){
  if(canStore){try{var r=localStorage.getItem(KEY);if(r){var p=JSON.parse(r);
    if(p&&typeof p.start==="number")return{start:p.start,log:p.log||{}};}}catch(e){}}
  return null;
}
function saveData(){
  if(!canStore)return false;
  try{localStorage.setItem(KEY,JSON.stringify(data));return true;}catch(e){return false;}
}

/* ---- 編集されたアクション（端末保存）。未編集の条は原文を使用 ---- */
var ACTS_KEY="shiori-acts-v1";
var userActs={};
if(canStore){try{var ra=localStorage.getItem(ACTS_KEY);if(ra){var pa=JSON.parse(ra);if(pa&&typeof pa==="object")userActs=pa;}}catch(e){}}
function saveActs(){if(!canStore)return;try{localStorage.setItem(ACTS_KEY,JSON.stringify(userActs));}catch(e){}}
function actsOf(i){
  if(userActs[i]&&userActs[i].length)return userActs[i];
  return ART[i].a;
}

/* ============ 状態 ============ */
var data=loadData();
if(!data){data=canStore?{start:dayNum(),log:{}}:{start:ANCHOR,log:{}};if(canStore)saveData();}
var today=dayNum();
var tab="today", showAlt=false, openArt=null, confirmReset=false;
var noteMsg="", ioMsg="", ioKeep="", stampAnim=false, saveFail=false;
var editArt=null, editMsg="", showIcon=false;
var chipsNow=[];

function calc(){
  var start=(typeof data.start==="number")?data.start:ANCHOR;
  var off=Math.max(0,today-start);
  return{aIdx:off%17,cycle:Math.floor(off/17)+1,baseAct:(Math.floor(off/17))%10};
}
function tKey(){return keyFromDayNum(today);}
function entry(){return data.log[tKey()]||{};}
function actIdx(){var e=entry();var c=calc();return(typeof e.ov==="number")?e.ov:c.baseAct;}
function curActs(){return actsOf(calc().aIdx);}

function persist(){var ok=saveData();saveFail=!ok&&canStore;if(!canStore)saveFail=false;}
function patchToday(patch){
  var k=tKey(),cur=data.log[k]||{},c=calc();
  var m=document.getElementById("memo");
  var draft=m?m.value.trim():(cur.note||"");
  var next={};for(var key in cur)next[key]=cur[key];
  next.a=c.aIdx;next.act=actIdx();
  if(draft)next.note=draft;
  for(var key2 in patch)next[key2]=patch[key2];
  data.log[k]=next;persist();
}

/* ============ 操作 ============ */
function doAct(x,arg){
  if(x==="tab"){tab=arg;showAlt=false;confirmReset=false;noteMsg="";ioMsg="";render();return;}
  if(x==="done"){var was=!!entry().done;patchToday({done:!was});stampAnim=!was;render();stampAnim=false;return;}
  if(x==="altToggle"){showAlt=!showAlt;render();return;}
  if(x==="altPick"){patchToday({ov:parseInt(arg,10)});showAlt=false;render();return;}
  if(x==="saveNote"){patchToday({});noteMsg="保存しました ✓";render();return;}
  if(x==="artToggle"){var i=parseInt(arg,10);openArt=(openArt===i)?null:i;render();return;}
  if(x==="resetAsk"){confirmReset=true;render();return;}
  if(x==="resetNo"){confirmReset=false;render();return;}
  if(x==="resetGo"){data.start=today;persist();confirmReset=false;tab="today";render();return;}
  if(x==="ioExport"){ioKeep=JSON.stringify({start:data.start,log:data.log,acts:userActs});ioMsg="書き出しました。全文をコピーして保管してください。";render();return;}
  if(x==="ioImport"){
    var io=document.getElementById("io");var txt=io?io.value:"";
    try{var p=JSON.parse(txt);
      if(!p||typeof p.start!=="number"||typeof p.log!=="object")throw new Error("bad");
      data={start:p.start,log:p.log||{}};persist();
      if(p.acts&&typeof p.acts==="object"){userActs=p.acts;saveActs();}
      ioKeep=txt;ioMsg="取り込みました ✓";
    }catch(e){ioKeep=txt;ioMsg="形式が正しくありません。書き出した文字列をそのまま貼り付けてください。";}
    render();return;
  }
  if(x==="chip"){var mm=document.getElementById("memo");if(!mm)return;
    var tt=chipsNow[parseInt(arg,10)]||"";
    var vv=mm.value;
    if(vv&&vv.slice(-1)!=="\n")vv+="\n";
    mm.value=vv+tt;mm.focus();
    try{mm.selectionStart=mm.selectionEnd=mm.value.length;}catch(e2){}
    return;}
  if(x==="editOpen"){editArt=parseInt(arg,10);editMsg="";render();return;}
  if(x==="editClose"){editArt=null;editMsg="";render();return;}
  if(x==="editSave"){
    var areas=document.querySelectorAll(".editArea");
    var arr=[];
    for(var q=0;q<areas.length;q++){var v=areas[q].value.trim();if(v)arr.push(v);}
    if(arr.length===0){editMsg="1つ以上のアクションを残してください。";render();return;}
    userActs[editArt]=arr;saveActs();editMsg="保存しました ✓";render();return;
  }
  if(x==="editReset"){delete userActs[editArt];saveActs();editMsg="初期に戻しました ✓";render();return;}
  if(x==="iconShow"){showIcon=true;render();window.scrollTo(0,0);return;}
  if(x==="iconHide"){showIcon=false;render();return;}
}
document.addEventListener("click",function(ev){
  var el=ev.target.closest("[data-x]");
  if(!el)return;
  doAct(el.getAttribute("data-x"),el.getAttribute("data-arg"));
});

/* ============ 描画 ============ */
function stats(){
  var log=data.log||{},streak=0;
  for(var d=today;d>today-4000;d--){var k=keyFromDayNum(d);if(log[k]&&log[k].done)streak++;else break;}
  var total=0,items=[];
  for(var key in log){if(log[key]&&log[key].done)total++;items.push([key,log[key]]);}
  items.sort(function(a,b){return a[0]<b[0]?1:-1;});
  return{streak:streak,total:total,items:items.slice(0,30)};
}

    +'<div class="sheetHead"><div><div class="yj" style="font-size:11px;letter-spacing:.2em;color:var(--sub)">第'+KAN[i]+'条 ─ '+a.y+'</div>'

}

function render(){
  var c=calc();
  document.getElementById("hdr").innerHTML=fmtDate()+"<br>"+c.cycle+"周目・"+(c.aIdx+1)+"日目";
  var v="";
  if(tab==="today")v=vToday();
  else if(tab==="list")v=vList();
  else if(tab==="log")v=vLog();
  else v=vSet();
  document.getElementById("main").innerHTML=v+vEdit()+vIcon();
  var tabs=[["today","本","今日"],["list","条","十七条"],["log","記","記録"],["set","設","設定"]];
  var nh="";
  for(var i=0;i<tabs.length;i++){
    nh+='<button class="'+(tab===tabs[i][0]?'on':'')+'" data-x="tab" data-arg="'+tabs[i][0]+'">'
      +'<span class="g">'+tabs[i][1]+'</span><span class="t">'+tabs[i][2]+'</span></button>';
  }
  document.getElementById("nav").innerHTML=nh;
  var m=document.getElementById("memo");
  if(m){m.addEventListener("blur",function(){patchToday({});noteMsg="保存しました ✓";
    var row=m.parentElement.querySelector(".row span");if(row){row.className="msgGold";row.textContent="保存しました ✓";}});}
}

/* ============ 午前0時の自動切り替え ============ */
function refreshDay(){
  var n=dayNum();
  if(n!==today){today=n;showAlt=false;noteMsg="";render();}
}
setInterval(refreshDay,15000);
(function(){
  var now=new Date();
  var next=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,2);
  setTimeout(function(){refreshDay();},Math.max(1000,next.getTime()-now.getTime()));
})();
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible")refreshDay();});
window.addEventListener("focus",refreshDay);
window.addEventListener("pageshow",refreshDay);

render();
</script>
